name: Build Windows installer

# Builds the NSIS GUI installer (jt-doc-tools-<ver>-setup.exe) on an Ubuntu
# runner via makensis. The installer is a thin bootstrapper: it ships only
# the PowerShell core scripts + LICENSE + icon and downloads everything else
# at runtime, so the .exe stays small (~well under 1 MB).
#
# This workflow is NEW and isolated -- it does not touch the existing
# install.ps1 / install.sh one-liner paths or the codeql workflow.
#
# Triggers:
#   * push of a version tag (v*)        -> build + attach to the GitHub Release
#   * manual run (workflow_dispatch)    -> build + upload as a workflow artifact
#
# Code signing: SignPath OSS (approved 2026-06). The signing step is GATED on
# the SIGNPATH_ORG_ID repo secret being present — until you add the secrets it
# is skipped and the (unsigned) installer is released as before. Once the three
# secrets + matching SignPath slugs exist, the next tag is auto-signed.
# Setup: packaging/windows/SIGNPATH-APPLICATION.md §3-4 (gitignored).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for the installer filename (blank = read app/main.py)'
        required: false
        default: ''

permissions:
  contents: write   # needed by action-gh-release to attach assets

jobs:
  build:
    runs-on: ubuntu-latest
    # Secrets can't be used directly in `if:` — surface presence via env.
    # POLICY_SLUG = test-signing during the SignPath TEST-certificate phase;
    # switch to release-signing once SignPath issues the PRODUCTION cert
    # (release-signing shows INVALID in the console until then).
    env:
      HAS_SIGNPATH: ${{ secrets.SIGNPATH_ORG_ID }}
      SIGNPATH_PROJECT_SLUG: jt-doc-tools
      SIGNPATH_POLICY_SLUG: test-signing
      SIGNPATH_ARTIFACT_SLUG: installer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis
          makensis -VERSION

      - name: Determine version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$V" ]; then
            V=$(grep -oP 'VERSION\s*=\s*"\K[^"]+' app/main.py | head -1)
          fi
          if [ -z "$V" ]; then
            echo "Could not determine version" >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building installer for version $V"

      - name: Build installer
        working-directory: packaging/windows
        run: |
          makensis -DVERSION=${{ steps.ver.outputs.version }} installer.nsi
          ls -la jt-doc-tools-${{ steps.ver.outputs.version }}-setup.exe

      - name: Upload as workflow artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: jt-doc-tools-${{ steps.ver.outputs.version }}-setup
          path: packaging/windows/jt-doc-tools-${{ steps.ver.outputs.version }}-setup.exe
          if-no-files-found: error

      # --- code signing (SignPath OSS) — skipped automatically if no secret ---
      - name: Sign installer (SignPath)
        id: sign
        if: ${{ github.ref_type == 'tag' && env.HAS_SIGNPATH != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_SLUG }}
          github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: packaging/windows/signed

      - name: Select release file (signed if present, else unsigned)
        id: pick
        if: github.ref_type == 'tag'
        run: |
          UNSIGNED="packaging/windows/jt-doc-tools-${{ steps.ver.outputs.version }}-setup.exe"
          SIGNED=$(ls packaging/windows/signed/*.exe 2>/dev/null | head -1)
          if [ -n "$SIGNED" ] && [ -f "$SIGNED" ]; then
            echo "Using SIGNED installer: $SIGNED"
            echo "file=$SIGNED" >> "$GITHUB_OUTPUT"
          else
            echo "Using UNSIGNED installer (SignPath not configured yet)"
            echo "file=$UNSIGNED" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pick.outputs.file }}
          fail_on_unmatched_files: true
